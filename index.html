<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern 3D Room</title>
  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">
    <h1>✦ <span>modern</span> room</h1>
    <div class="badge">3D interactive</div>
    <div class="spacer"></div>
    <div class="zoom-indicator" id="zoomLevel">100%</div>
  </div>

  <!-- 3D Container -->
  <div id="room-container"></div>

  <!-- Zoom Controls -->
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn" aria-label="zoom in">＋</button>
    <button class="zoom-btn" id="zoomOut" aria-label="zoom out">−</button>
  </div>

  <!-- Hint -->
  <div class="hint">🖱 drag to rotate · scroll to zoom</div>

  <!-- Three.js from CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.126.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.126.0/examples/jsm/"
      }
    }
  </script>

  <!-- JavaScript -->
  <script type="module" src="script.js"></script>
</body>

</html>
